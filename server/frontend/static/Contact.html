<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/bootstrap.min.css">
<style>
body{
    font-family: Arial, sans-serif;
    background:#ffffff;
}

.container{
    width:900px;
    margin:30px auto;
    border:2px solid #ccc;
    border-radius:30px;
    background:#f8f8f8;
    padding:20px;
}

.top-image{
    text-align:center;
}

.top-image img{
    width:60%;
    height:180px;
    object-fit:cover;
}

.content{
    display:flex;
    margin-top:20px;
}

.left{
    width:50%;
    text-align:center;
    border-top:1px solid #ccc;
    padding-top:20px;
}

.left img{
    width:180px;
}

.right{
    width:50%;
    border-left:2px solid #888;
    text-align:center;
    padding:20px;
    color:#5f7fe0;
}

.right p{
    margin:8px 0;
    font-size:15px;
}

.right strong{
    color:#4d6edb;
}
</style>
</head>

<body>

<div class="container">

    <div class="top-image">
        <img src="car_dealership.jpg" alt="Cars">
    </div>

    <div class="content">

        <div class="left">
            <img src="contactus.png" alt="Contact Icon">
        </div>

        <div class="right">

            <p><strong>Contact Customer Service</strong></p>
            <p>support@bestcars.com</p>

            <p><strong>Contact our National Advertising team</strong></p>
            <p>NationalSales@bestcars.com</p>

            <p><strong>Contact our Public Relations team</strong></p>
            <p>PR@bestcars.com</p>

            <p><strong>Contact the bestcars.com offices</strong></p>
            <p>312-611-1111</p>

            <p><strong>Become a bestcars.com car dealer</strong></p>
            <p>Visit growth.bestcars.com</p>

        </div>

    </div>

</div>

</body>
</html>
